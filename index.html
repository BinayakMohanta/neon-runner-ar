<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Neon Runner AR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background-color: #000;
      color: white;
      font-family: 'Courier New', monospace;
      width: 100vw;
      height: 100vh;
      position: fixed;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: none;
      pointer-events: none;
    }

    .hud-line {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 8px;
      font-size: clamp(14px, 4vw, 24px);
    }

    .score-text {
      color: #66FCF1;
      text-shadow: 0 0 10px #66FCF1, 0 0 20px rgba(102, 252, 241, 0.5);
      font-weight: bold;
    }

    .data-text {
      color: #45A29E;
      text-shadow: 0 0 8px #45A29E;
      text-transform: uppercase;
      font-size: 0.85em;
    }

    /* Menus */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(4px);
      z-index: 100;
      text-align: center;
    }

    #start-screen {
      display: flex;
    }

    #game-over-screen {
      display: none;
    }

    h1 {
      color: #66FCF1;
      text-shadow: 0 0 20px #66FCF1, 0 0 40px rgba(102, 252, 241, 0.5);
      font-size: clamp(40px, 10vw, 80px);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    h2 {
      color: #ff0055;
      text-shadow: 0 0 20px #ff0055, 0 0 40px rgba(255, 0, 85, 0.5);
      font-size: clamp(32px, 8vw, 64px);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn {
      background: transparent;
      color: #66FCF1;
      border: 2px solid #66FCF1;
      padding: 12px 32px;
      font-size: clamp(16px, 4vw, 24px);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 15px rgba(102, 252, 241, 0.2), inset 0 0 15px rgba(102, 252, 241, 0);
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: #66FCF1;
      color: #000;
      box-shadow: 0 0 30px rgba(102, 252, 241, 0.8), inset 0 0 20px rgba(102, 252, 241, 0.3);
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .ar-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      color: #45A29E;
      z-index: 5;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(69, 162, 158, 0.5);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="hud-line">
      <span class="score-text" id="score">SCORE: 0</span>
      <span class="data-text" id="best-score">BEST: 0</span>
    </div>
    <div class="hud-line">
      <span class="data-text" id="game-level">LEVEL: 1</span>
      <span class="data-text" id="game-speed">SPEED: 1.0x</span>
    </div>
  </div>

  <div id="start-screen" class="menu-overlay">
    <h1>Neon Runner</h1>
    <p style="font-size: clamp(14px, 3vw, 18px); color: #45A29E; margin-bottom: 10px;">AR MODE AVAILABLE</p>
    <button id="start-btn" class="btn">START SYSTEM</button>
  </div>

  <div id="game-over-screen" class="menu-overlay">
    <h2>SYSTEM CRASH</h2>
    <p class="score-text" id="final-score">FINAL SCORE: 0</p>
    <button id="restart-btn" class="btn">REBOOT SYSTEM</button>
  </div>

  <div class="ar-info" id="ar-info"></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
